<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2;url=/">
    <title>Выход из системы</title>
    <style>
        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #333;
        }
        .card h2 {
            color: #81c784;
            margin-bottom: 1rem;
        }
        .btn {
            background: #81c784;
            color: #1a1a1a;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>👋 Вы вышли из системы</h2>
        <p>Спасибо, что посетили шахматную академию!</p>
        <a href="/" class="btn">На главную</a>
    </div>
</body>
</html>
