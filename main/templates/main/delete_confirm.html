{% extends 'main/base.html' %}

{% block content %}
<style>
    .confirm-card {
        max-width: 500px;
        margin: 50px auto;
        background: #1a1a1a;
        padding: 2rem;
        border-radius: 16px;
        border: 1px solid #333;
        text-align: center;
    }
    .confirm-card h2 {
        color: #ff4444;
        margin-bottom: 1rem;
    }
    .confirm-card .tournament-name {
        color: #81c784;
        font-size: 1.2rem;
        font-weight: bold;
        margin: 1rem 0;
    }
    .buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 1.5rem;
    }
</style>

<div class="confirm-card">
    <h2>⚠️ Подтверждение удаления</h2>
    <p>Вы уверены, что хотите удалить турнир?</p>
    <div class="tournament-name">"{{ tournament.name }}"</div>
    <p style="color:#ff4444;">Это действие нельзя отменить!</p>
    <div class="buttons">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
        </form>
        <a href="/" class="btn btn-primary">Отмена</a>
    </div>
</div>
{% endblock %}
