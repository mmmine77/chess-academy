{% extends 'main/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; background: #1a1a1a; padding: 2rem; border-radius: 16px;">
    <h2 style="color: #81c784;">{{ title }}</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'news_list' %}" class="btn btn-danger">Отмена</a>
    </form>
</div>
{% endblock %}
