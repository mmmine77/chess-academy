{% extends 'main/base.html' %}

{% block content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
        background: #1a1a1a;
        padding: 2rem;
        border-radius: 16px;
        border: 1px solid #333;
    }
    .form-container h2 {
        color: #81c784;
        margin-bottom: 1.5rem;
    }
    .form-group {
        margin-bottom: 1rem;
    }
    .form-group label {
        display: block;
        color: #b0b0b0;
        margin-bottom: 0.5rem;
        font-weight: 500;
    }
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 0.75rem;
        background: #2a2a2a;
        border: 1px solid #404040;
        border-radius: 8px;
        color: #fff;
    }
    .form-group textarea {
        resize: vertical;
        min-height: 100px;
    }
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }
    .btn-submit {
        background: #81c784;
        color: #000;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
        margin-top: 1rem;
        width: 100%;
    }
    .btn-submit:hover {
        background: #6bb86e;
    }
    .btn-cancel {
        background: #ff4444;
        color: #fff;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        margin-top: 0.5rem;
        width: 100%;
        text-align: center;
        display: inline-block;
        text-decoration: none;
    }
    .btn-cancel:hover {
        background: #cc0000;
    }
</style>

<div class="form-container">
    <h2>{{ title }}</h2>
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Тема урока *</label>
            <input type="text" name="name" value="{{ lesson.name|default:'' }}" required placeholder="Введите тему урока">
        </div>

        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" rows="3" placeholder="Описание урока">{{ lesson.description|default:'' }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Дата *</label>
                <input type="date" name="date" value="{{ lesson.date|date:'Y-m-d'|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Время *</label>
                <input type="time" name="time" value="{{ lesson.time|time:'H:i'|default:'' }}" required>
            </div>
        </div>

        <div class="form-group">
            <label>Адрес *</label>
            <input type="text" name="location" value="{{ lesson.location|default:'' }}" required placeholder="г. Москва, ул. Примерная, д. 1">
        </div>

        <button type="submit" class="btn-submit">{% if lesson %}Сохранить{% else %}Создать урок{% endif %}</button>
        <a href="{% url 'lessons_list' %}" class="btn-cancel">Отмена</a>
    </form>
</div>
{% endblock %}
